<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="GeoPhoto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset=".55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0b1220" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- App-icon background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#gloss)"/>

  <!-- Location pin (white teardrop) -->
  <g filter="url(#ds)">
    <path d="M256 86 C315 86 362 133 362 192 C362 272 256 422 256 422 C256 422 150 272 150 192 C150 133 197 86 256 86 Z" fill="#ffffff"/>
  </g>

  <!-- Camera lens inside the pin head -->
  <circle cx="256" cy="190" r="60" fill="url(#lens)"/>
  <circle cx="256" cy="190" r="31" fill="#ffffff" opacity=".94"/>
  <circle cx="256" cy="190" r="15" fill="url(#lens)"/>
  <circle cx="236" cy="170" r="9" fill="#ffffff" opacity=".9"/>
</svg>
